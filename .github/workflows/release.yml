name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build extension
        run: npm run build
        env:
          EXT_VERSION: ${{ github.ref_name }}
          STORE_BUILD: "true"

      - name: Create release archive
        run: |
          cd dist
          zip -r "../mattermost-deck-${GITHUB_REF_NAME}.zip" .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: mattermost-deck-${{ github.ref_name }}.zip
