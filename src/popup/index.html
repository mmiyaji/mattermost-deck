<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mattermost Deck</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        width: 220px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        background: #1e1e2e;
        color: #e2e8f0;
      }
      .popup-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px 10px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      .popup-header img { width: 20px; height: 20px; }
      .popup-header span { font-weight: 600; font-size: 14px; }
      .popup-menu {
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .popup-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 9px 10px;
        background: transparent;
        border: 0;
        border-radius: 6px;
        color: #e2e8f0;
        font-size: 13px;
        cursor: pointer;
        text-align: left;
        transition: background 0.12s;
      }
      .popup-btn:hover { background: rgba(255,255,255,0.09); }
      .popup-btn:active { background: rgba(255,255,255,0.14); }
      .popup-btn svg { flex: none; opacity: 0.75; }
      .popup-divider {
        height: 1px;
        background: rgba(255,255,255,0.1);
        margin: 4px 6px;
      }
      .popup-btn--disabled {
        opacity: 0.4;
        cursor: default;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="popup-header">
      <img src="assets/icons/icon-32.png" alt="" />
      <span>Mattermost Deck</span>
    </div>
    <div class="popup-menu">
      <button class="popup-btn" id="btn-install">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        アプリをインストール
      </button>
      <button class="popup-btn" id="btn-page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        ページを開く
      </button>
      <div class="popup-divider"></div>
      <button class="popup-btn" id="btn-settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        設定
      </button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
